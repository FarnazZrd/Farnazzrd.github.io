<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>پیش از محو | گالری مجازی</title>
    <style>
        @font-face {
            font-family: 'B Nazanin';
            src: local('B Nazanin'), local('BNazanin');
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden;
            background-color: #050505; color: #fff; font-family: 'B Nazanin', Tahoma, sans-serif;
            user-select: none;
        }

        /* 1. Artistic Minimal Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0d0d0d; z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            transition: opacity 1.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        /* Subtle texture overlay for premium gallery look */
        #splash-screen::after {
            content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image:url('./soft-wallpaper.png');
            opacity: 0.15; pointer-events: none;
        }

        #splash-screen h1 {
            font-size: 64px; font-weight: normal; letter-spacing: 6px;
            margin-bottom: 10px; color: #f5f5f5; text-shadow: 0 0 20px rgba(255,255,255,0.05);
        }

        #splash-screen .sub-text {
            font-size: 20px; color: #666; margin-bottom: 50px; font-weight: normal;
        }

        .enter-btn {
            padding: 12px 45px; background: none; border: 1px solid rgba(255,255,255,0.2);
            color: #aaa; font-size: 18px; cursor: pointer; transition: all 0.4s ease;
            font-family: 'B Nazanin', sans-serif; border-radius: 2px;
        }

        .enter-btn:hover {
            border-color: #fff; color: #fff; background: rgba(255,255,255,0.03);
            box-shadow: 0 0 25px rgba(255,255,255,0.08);
        }

        /* 2. Interactive Canvas Area */
        #canvas-container { width: 100%; height: 100%; display: none; }
        
        .ui-overlay { position: absolute; z-index: 10; opacity: 0; transition: opacity 1s ease; }
        #top-nav { top: 25px; right: 25px; display: flex; gap: 15px; }
        
        .nav-btn {
            background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(255, 255, 255, 0.15);
            color: #ccc; padding: 8px 20px; font-size: 15px; cursor: pointer;
            border-radius: 3px; font-family: 'B Nazanin', sans-serif; transition: all 0.3s;
        }
        .nav-btn:hover { color: #fff; border-color: #fff; background: rgba(255,255,255,0.1); }

        #hint-text {
            bottom: 25px; left: 50%; transform: translateX(-50%);
            background: rgba(0,0,0,0.75); padding: 10px 25px; border-radius: 4px;
            font-size: 15px; color: #999; border: 1px solid #222; text-align: center; pointer-events: none;
        }

        /* 3. Lightbox Modals */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0;
            width: 100%; height: 100%; background: rgba(5,5,5,0.93);
            backdrop-filter: blur(12px); justify-content: center; align-items: center;
        }

        .modal-content {
            max-width: 800px; width: 85%; position: relative;
            background: #111; padding: 30px; border-radius: 4px; border: 1px solid #222;
        }
        
        #lightbox-modal .modal-content { background: #0a0a0a; border: none; text-align: center; }
        #lightbox-img { max-width: 100%; max-height: 70vh; border: 3px solid #1c1c1c; margin-bottom: 20px; }
        #art-info { text-align: center; color: #bbb; font-size: 18px; line-height: 1.6; }

        .close-x {
            float: left; font-size: 32px; cursor: pointer; color: #777; line-height: 20px; transition: color 0.3s;
        }
        .close-x:hover { color: #fff; }
        h2 { margin-top: 0; color: #fff; font-weight: normal; border-bottom: 1px solid #222; padding-bottom: 10px; }
    </style>
    <script src="./three.min.js"></script>
    <script src="./OrbitControls.js"></script>
</head>
<body>

    <div id="splash-screen">
        <h1>پیش از محو</h1>
        <div class="sub-text">مجموعه عکس فرناز زرین دست</div>
        <button class="enter-btn" onclick="startExperience()">ورود به گالری</button>
    </div>

    <div id="top-nav" class="ui-overlay">
        <button class="nav-btn" onclick="openModal('statement-modal')">مشاهده استیتمنت</button>
        <button class="nav-btn" onclick="openModal('info-modal')">اطلاعات هنرمند</button>
    </div>
    
    <div id="hint-text" class="ui-overlay">
        راهنما: جهت چرخش کلیک کنید و بکشید (Drag) • برای مشاهده بزرگتر روی قاب‌ها کلیک کنید
    </div>

    <div id="canvas-container"></div>

    <div id="statement-modal" class="modal" onclick="closeModal('statement-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeModal('statement-modal')">&times;</span>
            <h2>بیانیه نمایشگاه (Statement)</h2>
            <div id="statement-body" style="text-align: justify; line-height: 1.9; font-size: 18px; max-height: 70vh; overflow-y: auto;"></div>
        </div>
    </div>

    <div id="lightbox-modal" class="modal" onclick="closeModal('lightbox-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeModal('lightbox-modal')">&times;</span>
            <img id="lightbox-img" src="" alt="Artwork">
            <div id="art-info"></div>
        </div>
    </div>

    <div id="info-modal" class="modal" onclick="closeModal('info-modal')">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="close-x" onclick="closeModal('info-modal')">&times;</span>
            <h2>درباره هنرمند</h2>
            <p style="font-size: 18px; color: #ccc;"><strong>نام عکاس:</strong> فرناز زرین دست</p>
            <p style="font-size: 18px; color: #ccc;"><strong>مشخصات پروژه:</strong> دانشجوی کارشناسی عکاسی - بهار ۱۴۰۵</p>
        </div>
    </div>

    <script>
        const statementText = `این مجموعه تلاشی است برای ثبت و بازخوانی چهره‌ای از تهران که آرام‌آرام از حافظه‌ی شهر پاک می‌شود؛ محله‌هایی با کوچه‌های کم‌عرض، دیوارهای فرسوده اما زنده، و خانه‌های ویلایی که امروز تنها نشانه‌هایی پراکنده از آنها باقی مانده است.
اما پرسش اصلی مجموعه این است که تهرانِ در حال محو شدن چگونه در حافظه جمعی ما زنده می‌ماند و چه بخشی از آن برای همیشه از یاد می‌رود؟ در میان سرعت دگرگونی کالبد شهری، این مجموعه مکث کوتاهی است بر لحظه‌هایی که شاید آخرین نشانه‌های یک زیست جمعی فراموش‌شده باشند.
آنچه مرا به این پروژه کشاند، ضرورت ثبت و مشاهده دوباره فضاهایی است که با توسعه شتاب‌زده، در خطر فراموشی قرار دارند.
ارتباط میان تصاویر بر پایه سه محور شکل گرفته است: تکرار عناصر معماری قدیمی، نشانه‌های زیست‌محله‌ای، و ردهای زندگی روزمره‌ای که هنوز جریان دارد.
شیوه ارائه نیز بر ایجاد تجربه جست‌وجو استوار است. اندازه‌های متفاوت چاپ‌ها، فاصله‌های نامنظم میان قاب‌ها، و مسیر دایره‌وار حرکت، مخاطب را از نگاه خطی دور می‌کند، درست مثل قدم زدن در کوچه‌پس‌کوچه‌های تهران قدیم.
این مجموعه دعوتی به نگاه دوباره است، و فرصتی برای مواجهه با این پرسش که چه چیزهایی از شهر بی‌آنکه بدانیم ناپدید می‌شوند و چه بخش‌هایی هنوز ظرفیت بازخوانی دارند.
این مجموعه می‌کوشد یادآوری کند که تهران فقط آسمان‌خراش نیست؛ شهری است با حافظه‌ای عمیق، که اگر دیده نشود، برای همیشه از دست خواهد رفت.`;
        
        document.getElementById('statement-body').innerHTML = statementText.split('\n').map(p => `<p>${p}</p>`).join('');

        // --- 3D Architecture Setup ---
        let scene, camera, renderer, controls;
        const clickableArtworks = [];
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // Dimensions (7m x 10m x 3m)
        const w = 7, l = 10, h = 3;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 1.5, 4.2); // Balanced starting position inside near entrance

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;
            controls.maxPolarAngle = Math.PI / 2 - 0.02;
            controls.minDistance = 0.5;
            controls.maxDistance = 9.5;
            controls.target.set(0, 1.4, 0);

            // Architectural Materials
            const wallMat = new THREE.MeshStandardMaterial({ color: 0xfbfbfb, roughness: 0.95 }); 
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x4a4a4a, roughness: 0.25, metalness: 0.2 }); 
            const ceilingMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee, roughness: 0.9 });
            const frameMat = new THREE.MeshStandardMaterial({ color: 0x151515, roughness: 0.8 });

            // Structural Assembly
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(w, l), floorMat);
            floor.rotation.x = -Math.PI / 2; floor.receiveShadow = true; scene.add(floor);

            const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(w, l), ceilingMat);
            ceiling.rotation.x = Math.PI / 2; ceiling.position.y = h; scene.add(ceiling);

            // Walls setup
            const wallN = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat); wallN.position.set(0, h/2, -l/2); wallN.receiveShadow = true; scene.add(wallN);
            const wallS = new THREE.Mesh(new THREE.PlaneGeometry(w, h), wallMat); wallS.position.set(0, h/2, l/2); wallS.rotation.y = Math.PI; wallS.receiveShadow = true; scene.add(wallS);
            const wallE = new THREE.Mesh(new THREE.PlaneGeometry(l, h), wallMat); wallE.position.set(w/2, h/2, 0); wallE.rotation.y = -Math.PI / 2; wallE.receiveShadow = true; scene.add(wallE);
            const wallW = new THREE.Mesh(new THREE.PlaneGeometry(l, h), wallMat); wallW.position.set(-w/2, h/2, 0); wallW.rotation.y = Math.PI / 2; wallW.receiveShadow = true; scene.add(wallW);

            // Entrance Door & Rest Bench
            const door = new THREE.Mesh(new THREE.BoxGeometry(1.2, 2.2, 0.04), new THREE.MeshStandardMaterial({ color: 0x222222 }));
            door.position.set(0, 2.2/2, l/2 - 0.02); scene.add(door);

            const bench = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.45, 2.2), new THREE.MeshStandardMaterial({ color: 0x5a5a5a, roughness: 0.7 }));
            bench.position.set(0, 0.45/2, 0); bench.castShadow = true; bench.receiveShadow = true; scene.add(bench);

            // --- Hanging Statement Panel (Enlarged & Shifted Right) ---
            const signGroup = new THREE.Group();
            const signBoard = new THREE.Mesh(new THREE.BoxGeometry(1.7, 1.7, 0.03), new THREE.MeshStandardMaterial({color: 0x281c12, roughness: 0.8}));
            signGroup.add(signBoard);

            const statementPaper = new THREE.Mesh(new THREE.PlaneGeometry(1.6, 1.6), new THREE.MeshBasicMaterial({ map: createStatementTexture() }));
            statementPaper.position.z = 0.016; signGroup.add(statementPaper);

            // Sleek mounting rods
            const rodMat = new THREE.MeshBasicMaterial({color: 0x111111});
            const rL = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.7), rodMat); rL.position.set(-0.75, 0.85, 0);
            const rR = new THREE.Mesh(new THREE.CylinderGeometry(0.005, 0.005, 0.7), rodMat); rR.position.set(0.75, 0.85, 0);
            signGroup.add(rL, rR);
            signGroup.position.set(0.6, 1.5, 2.2); // Shifted right (X=0.6) and positioned nicely near bench
            scene.add(signGroup);

            // Lighting Setup
            const ambientLight = new THREE.AmbientLight(0xffecc4, 0.25); scene.add(ambientLight);

            // --- Artwork Deployer ---
            const textureLoader = new THREE.TextureLoader();
            const labelInfoString = "فرناز زرین دست . تهران . ایران، بهار ۱۴۰۴";

            function createArtwork(imgUrl, width, height, x, y, z, rotY, lightIntensity) {
                const artGroup = new THREE.Group();
                const fT = 0.02; // frame trim

                const frame = new THREE.Mesh(new THREE.BoxGeometry(width + fT*2, height + fT*2, 0.03), frameMat);
                frame.castShadow = true; artGroup.add(frame);

                const canvasMat = new THREE.MeshStandardMaterial({ roughness: 0.8, metalness: 0.05 });
                textureLoader.load(imgUrl, function(tex) { canvasMat.map = tex; canvasMat.needsUpdate = true; });
                const canvas = new THREE.Mesh(new THREE.PlaneGeometry(width, height), canvasMat);
                canvas.position.z = 0.016; artGroup.add(canvas);

                // Small minimal placard label under frame
                const labelTex = createLabelTexture(labelInfoString, "14px 'B Nazanin'", "#333333", "#eeeeee", 350, 45);
                const label = new THREE.Mesh(new THREE.PlaneGeometry(width * 0.8, 0.05), new THREE.MeshBasicMaterial({ map: labelTex }));
                label.position.set(0, -(height/2 + 0.07), 0.016); artGroup.add(label);

                artGroup.position.set(x, y, z); artGroup.rotation.y = rotY;
                scene.add(artGroup);

                // Setup interactive references
                canvas.userData = { imgUrl: imgUrl, info: "تهران - محله تجریش" };
                clickableArtworks.push(canvas);

                // Precise directed spotlights
                const spotLight = new THREE.SpotLight(0xfff3e0, lightIntensity);
                spotLight.position.set(x + Math.sin(rotY)*1.2, h - 0.1, z + Math.cos(rotY)*1.2);
                spotLight.target = frame; spotLight.angle = Math.PI / 5; spotLight.penumbra = 0.5;
                spotLight.castShadow = true; scene.add(spotLight);
            }

            // Populating Actual Student Photograph Files
            const eyeLevel = 1.45;
            // دیوار شمالی (روبرو)
            createArtwork('IMG_4453.JPG', 0.40, 0.60,  1.6, eyeLevel, -l/2 + 0.02, 0, 1.0); 
            createArtwork('IMG_4456.JPG', 0.30, 0.40, -1.6, eyeLevel, -l/2 + 0.02, 0, 0.7); 
            // دیوار شرقی (راست)
            createArtwork('IMG_4440.JPG', 0.40, 0.60,  w/2 - 0.02, eyeLevel, -2.2, -Math.PI/2, 0.9); 
            createArtwork('IMG_4424.JPG', 0.30, 0.40,  w/2 - 0.02, eyeLevel,  2.2, -Math.PI/2, 0.6); 
            // دیوار غربی (چپ)
            createArtwork('IMG_4390.JPG', 0.40, 0.60, -w/2 + 0.02, eyeLevel, -2.2,  Math.PI/2, 0.8); 

            window.addEventListener('resize', onWindowResize, false);
            window.addEventListener('click', onDocumentClick, false);
        }

        // --- Canvas Text Generators ---
        function createStatementTexture() {
            const canvas = document.createElement('canvas'); canvas.width = 1200; canvas.height = 1200;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = "#f6eedb"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#22140a"; ctx.font = "30px 'B Nazanin'"; ctx.textAlign = "right"; ctx.direction = "rtl";
            
            const lines = statementText.split('\n'); let yPos = 90;
            lines.forEach(line => {
                const words = line.split(' '); let currentLine = '';
                words.forEach(word => {
                    let testLine = currentLine + word + ' ';
                    if (ctx.measureText(testLine).width > 1100) { ctx.fillText(currentLine, 1140, yPos); currentLine = word + ' '; yPos += 48; }
                    else currentLine = testLine;
                });
                ctx.fillText(currentLine, 1140, yPos); yPos += 62;
            });
            return new THREE.CanvasTexture(canvas);
        }

        function createLabelTexture(text, fontStr, color, bgColor, width, height) {
            const canvas = document.createElement('canvas'); canvas.width = width; canvas.height = height;
            const ctx = canvas.getContext('2d'); ctx.fillStyle = bgColor; ctx.fillRect(0, 0, width, height);
            ctx.fillStyle = color; ctx.font = fontStr; ctx.textBaseline = 'middle'; ctx.textAlign = 'center';
            ctx.fillText(text, width / 2, height / 2);
            return new THREE.CanvasTexture(canvas);
        }

        // --- Navigation Transitions ---
        function startExperience() {
            const splash = document.getElementById('splash-screen');
            const mainCont = document.getElementById('canvas-container');
            
            splash.style.opacity = '0';
            setTimeout(() => {
                splash.style.display = 'none';
                mainCont.style.display = 'block';
                document.querySelectorAll('.ui-overlay').forEach(el => el.style.opacity = '1');
                onWindowResize(); // Force window recalculation
            }, 1200);
        }

        function onDocumentClick(event) {
            if (event.target.tagName === 'BUTTON' || event.target.classList.contains('close-x')) return;
            
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);

            const intersects = raycaster.intersectObjects(clickableArtworks);
            if (intersects.length > 0) {
                const targetPhoto = intersects[0].object;
                document.getElementById('lightbox-img').src = targetPhoto.userData.imgUrl;
                document.getElementById('art-info').innerText = targetPhoto.userData.info;
                openModal('lightbox-modal');
            }
        }

        window.openModal = function(id) { document.getElementById(id).style.display = 'flex'; };
        window.closeModal = function(id) { document.getElementById(id).style.display = 'none'; };

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            controls.update();
            renderer.render(scene, camera);
        }

        init();
        animate();
    </script>
</body>
</html>
